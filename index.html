<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="⚡ Triveni Pathsala — Lightning fast smart redirect with stunning modern UI.">
  <meta name="robots" content="noindex, nofollow">
  <title>⚡ Triveni Pathsala · Vortex Redirect</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 30% 40%, #0B1120, #020408);
      font-family: 'Inter', system-ui, -apple-system, 'SF Pro Text', 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
      position: relative;
      overflow-x: hidden;
    }

    /* animated organic noise + floating light rays */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at 25% 40%, rgba(255, 180, 70, 0.08) 1.2%, transparent 1.8%),
                        repeating-linear-gradient(45deg, rgba(255, 200, 80, 0.02) 0px, rgba(255, 200, 80, 0.02) 2px, transparent 2px, transparent 8px);
      background-size: 65px 65px, 12px 12px;
      pointer-events: none;
      z-index: 0;
      animation: driftGlow 22s infinite alternate;
    }

    @keyframes driftGlow {
      0% { background-position: 0% 0%, 0% 0%; opacity: 0.6; }
      100% { background-position: 80px 100px, 40px 20px; opacity: 1; }
    }

    /* main neomorphic glass card */
    .redirect-card {
      max-width: 560px;
      width: 100%;
      background: rgba(12, 22, 35, 0.55);
      backdrop-filter: blur(24px);
      border-radius: 3.5rem;
      border: 1px solid rgba(255, 210, 100, 0.4);
      box-shadow: 0 35px 60px -20px rgba(0,0,0,0.6), 0 0 0 0.8px rgba(255, 210, 90, 0.2) inset, 0 8px 20px rgba(0,0,0,0.3);
      padding: 2rem 1.8rem;
      transition: transform 0.25s ease, box-shadow 0.35s ease;
      z-index: 2;
      animation: cardBreathing 4s infinite alternate;
    }

    @keyframes cardBreathing {
      0% { border-color: rgba(255, 200, 100, 0.35); box-shadow: 0 30px 50px -20px rgba(0,0,0,0.6), 0 0 0 0.5px rgba(255, 210, 90, 0.2) inset; }
      100% { border-color: rgba(255, 190, 70, 0.75); box-shadow: 0 40px 65px -12px rgba(255, 150, 40, 0.3), 0 0 0 2px rgba(255, 200, 80, 0.35) inset; }
    }

    @media (max-width: 500px) {
      .redirect-card {
        padding: 1.5rem 1.2rem;
        border-radius: 2.5rem;
      }
    }

    /* brand zone with electric pulse */
    .brand {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .lightning-icon {
      font-size: 3.4rem;
      display: inline-block;
      filter: drop-shadow(0 0 10px #ffb347);
      animation: electricPulse 1.6s ease-in-out infinite, levitate 3s ease-in-out infinite;
    }

    @keyframes electricPulse {
      0% { text-shadow: 0 0 2px #ffcc66, 0 0 4px #ffaa33; transform: scale(1);}
      50% { text-shadow: 0 0 22px #ffdd88, 0 0 15px #ffaa33; transform: scale(1.07);}
      100% { text-shadow: 0 0 2px #ffcc66, 0 0 4px #ffaa33; transform: scale(1);}
    }

    @keyframes levitate {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    .brand h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(125deg, #FFE6B0, #FFBC4A, #FFD977);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      margin-top: 0.6rem;
      margin-bottom: 0.2rem;
    }

    .brand p {
      color: #cae3ff;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 1px;
      opacity: 0.9;
      text-transform: uppercase;
    }

    /* hidden destination - elegant minimal badge */
    .secure-zone {
      background: rgba(0, 0, 0, 0.35);
      border-radius: 2rem;
      margin: 0.5rem 0 1.5rem 0;
      padding: 0.8rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 190, 80, 0.3);
    }

    .shield-message {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .shield-message span:first-child {
      font-size: 1.25rem;
      filter: drop-shadow(0 0 4px #ffb347);
    }

    .shield-message .info-text {
      font-size: 0.8rem;
      font-weight: 500;
      color: #eef5ff;
      letter-spacing: 0.3px;
    }

    .copy-dest-btn {
      background: rgba(255, 200, 100, 0.12);
      border: 1px solid rgba(255, 200, 100, 0.5);
      border-radius: 3rem;
      padding: 0.45rem 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: #FFE3A3;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      backdrop-filter: blur(5px);
    }

    .copy-dest-btn:hover {
      background: rgba(255, 190, 70, 0.35);
      border-color: #ffcc66;
      transform: scale(1.02);
      box-shadow: 0 2px 8px rgba(255, 180, 50, 0.3);
    }

    .copy-dest-btn:active {
      transform: scale(0.97);
    }

    /* countdown core */
    .countdown-area {
      margin: 1.2rem 0 1.4rem;
    }

    .timer-flex {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.6rem;
    }

    .timer-label {
      color: #c7ddff;
      font-weight: 600;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: 0.5px;
    }

    .seconds-badge {
      font-size: 3rem;
      font-weight: 800;
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: linear-gradient(145deg, #FFE0A0, #FFB347);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: 6px;
      transition: 0.08s linear;
      animation: countPop 0.3s ease-out;
    }

    @keyframes countPop {
      0% { transform: scale(0.7); opacity: 0.4; letter-spacing: 12px; }
      100% { transform: scale(1); opacity: 1; letter-spacing: 6px; }
    }

    /* glowing progress bar */
    .progress-container {
      background: #101a24;
      border-radius: 60px;
      height: 12px;
      width: 100%;
      overflow: hidden;
      margin: 0.6rem 0 0.2rem;
      box-shadow: inset 0 1px 4px #00000055;
    }

    .progress-fill {
      background: linear-gradient(90deg, #FFD966, #FFA94D, #FFD580);
      width: 100%;
      height: 100%;
      border-radius: 60px;
      transition: width 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      box-shadow: 0 0 12px #ffaa44;
      position: relative;
    }

    /* button group modern */
    .action-group {
      display: flex;
      gap: 1rem;
      margin: 1.8rem 0 0.8rem;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 140px;
      padding: 0.9rem 0.5rem;
      border-radius: 3rem;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      text-align: center;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      backdrop-filter: blur(5px);
    }

    .btn-primary {
      background: linear-gradient(115deg, #F0A81E, #FFC34D);
      color: #0f1a21;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(255, 150, 30, 0.35);
      border: 1px solid rgba(255, 240, 160, 0.7);
    }

    .btn-primary:hover {
      background: linear-gradient(115deg, #FFB83B, #FFD46E);
      transform: translateY(-3px);
      box-shadow: 0 14px 25px rgba(255, 150, 30, 0.55);
    }

    .btn-primary:active {
      transform: translateY(1px);
    }

    .btn-outline {
      background: rgba(18, 35, 48, 0.7);
      border: 1.5px solid rgba(255, 190, 70, 0.7);
      color: #ffefbf;
      font-weight: 600;
    }

    .btn-outline:hover {
      background: rgba(255, 180, 60, 0.25);
      border-color: #FFD27A;
      transform: translateY(-2px);
      box-shadow: 0 8px 15px rgba(0,0,0,0.25);
    }

    /* modern footnote */
    .info-footnote {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.7rem;
      color: #97afd1;
      border-top: 1px dashed rgba(255, 200, 100, 0.35);
      padding-top: 1rem;
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .info-footnote span {
      background: rgba(0, 0, 0, 0.3);
      padding: 0.3rem 1rem;
      border-radius: 40px;
      backdrop-filter: blur(2px);
      font-weight: 500;
    }

    /* flash overlay for redirect */
    @keyframes lightningFlash {
      0% { opacity: 0; }
      12% { opacity: 0.7; background: radial-gradient(circle at center, #FFE5A0, #FFB347, transparent); }
      100% { opacity: 0; }
    }

    .flash-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: radial-gradient(circle, rgba(255,220,100,0.45), rgba(255,150,30,0.2));
      z-index: 999;
      animation: lightningFlash 0.5s ease-out forwards;
    }

    /* mini toast feedback */
    .toast-msg {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) scale(0.9);
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      color: #FFE2A4;
      padding: 0.6rem 1.3rem;
      border-radius: 60px;
      font-size: 0.8rem;
      font-weight: 500;
      z-index: 1000;
      border: 1px solid #ffbc5e;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast-msg.show {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    @media (max-width: 480px) {
      .btn { padding: 0.8rem 0.2rem; font-size: 0.9rem; min-width: 120px; }
      .seconds-badge { font-size: 2.5rem; letter-spacing: 4px; }
      .shield-message .info-text { font-size: 0.7rem; }
    }
  </style>
</head>
<body>

<div class="redirect-card">
  <div class="brand">
    <div class="lightning-icon">⚡⚡⚡</div>
    <h1>Triveni Pathsala</h1>
    <p>The Aim of Excellence.</p>
  </div>

  <!-- Secure hidden destination zone: no URL preview, only copy action -->
  <div class="secure-zone">
    <div class="shield-message">
      <span></span>
      
    <align="center"><span class="info-text">    A premium Institute of JEE & NEET  </span></align>
    
  </div>
    <div class="copy" id="">
      <span></span> <span></span>
    </div>
  </div>

  <div class="countdown-area">
    <div class="timer-flex">
      <div class="timer-label">
        <span>⚡</span> LIGHTNING REDIRECT IN
      </div>
      <div class="seconds-badge" id="countdownDisplay">5</div>
    </div>
    <div class="progress-container">
      <div class="progress-fill" id="progressFill" style="width: 100%;"></div>
    </div>
  </div>

  <div class="action-group">
    <button class="btn btn-primary" id="redirectNowBtn">🚀 REDIRECT NOW</button>
    <button class="btn btn-outline" id="toggleHoldBtn">⏸️ HOLD</button>
  </div>

  <div class="info-footnote">
    <span></span>
    <span></span>
  </div>
</div>

<!-- toast container -->
<div id="copyToast" class="toast-msg">✨ Link copied to clipboard</div>

<script>
  (function() {
    // ---------- CONFIGURATION ----------
    const DEFAULT_REDIRECT_URL = "https://sumitverma00000000654165-tech.github.io/anand/";
    
    // URL sanitizer (security first)
    function sanitizeRedirectUrl(input) {
      if (!input || typeof input !== 'string') return DEFAULT_REDIRECT_URL;
      let raw = input.trim();
      if (raw === "") return DEFAULT_REDIRECT_URL;
      
      const dangerous = /^(javascript|data|vbscript):/i;
      if (dangerous.test(raw)) return DEFAULT_REDIRECT_URL;
      
      if (!/^https?:\/\//i.test(raw)) {
        raw = "https://" + raw;
      }
      
      try {
        const urlObj = new URL(raw);
        if (urlObj.protocol !== 'http:' && urlObj.protocol !== 'https:') {
          return DEFAULT_REDIRECT_URL;
        }
        return urlObj.href;
      } catch (e) {
        return DEFAULT_REDIRECT_URL;
      }
    }
    
    // get redirect url from query param "redirect"
    function getInitialRedirectUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      let customParam = urlParams.get('redirect');
      if (customParam) {
        try {
          customParam = decodeURIComponent(customParam);
        } catch(e) { /* fallback */ }
        return sanitizeRedirectUrl(customParam);
      }
      return DEFAULT_REDIRECT_URL;
    }
    
    // DOM elements
    const countdownDisplay = document.getElementById('countdownDisplay');
    const progressFill = document.getElementById('progressFill');
    const redirectNowBtn = document.getElementById('redirectNowBtn');
    const toggleHoldBtn = document.getElementById('toggleHoldBtn');
    const hiddenCopyBtn = document.getElementById('hiddenCopyBtn');
    const toastEl = document.getElementById('copyToast');
    
    // state
    let currentRedirectUrl = getInitialRedirectUrl();
    let countdown = 5;
    let countdownInterval = null;
    let redirectTimeout = null;
    let isHeld = false;
    let isRedirectPending = true;
    
    // helper: toast message
    function showToast(message, duration = 1500) {
      if (!toastEl) return;
      toastEl.textContent = message || '✨ Link copied';
      toastEl.classList.add('show');
      setTimeout(() => {
        toastEl.classList.remove('show');
      }, duration);
    }
    
    // update countdown UI (seconds + progress)
    function updateCountdownUI() {
      if (countdownDisplay) {
        countdownDisplay.textContent = countdown;
        // animation refresh
        countdownDisplay.style.animation = 'none';
        countdownDisplay.offsetHeight;
        countdownDisplay.style.animation = 'countPop 0.3s ease-out';
      }
      if (progressFill) {
        const percent = (countdown / 5) * 100;
        progressFill.style.width = `${percent}%`;
      }
    }
    
    // stop all timers
    function haltTimers() {
      if (countdownInterval) {
        clearInterval(countdownInterval);
        countdownInterval = null;
      }
      if (redirectTimeout) {
        clearTimeout(redirectTimeout);
        redirectTimeout = null;
      }
    }
    
    // perform redirect with lightning flash
    function performRedirect() {
      if (!currentRedirectUrl) return;
      if (!isRedirectPending && redirectTimeout === null && countdownInterval === null) {
        // already redirecting, avoid double
      }
      haltTimers();
      isRedirectPending = false;
      
      // dramatic flash overlay
      const flashDiv = document.createElement('div');
      flashDiv.className = 'flash-overlay';
      document.body.appendChild(flashDiv);
      setTimeout(() => {
        if (flashDiv && flashDiv.remove) flashDiv.remove();
      }, 550);
      
      const safeDest = sanitizeRedirectUrl(currentRedirectUrl);
      setTimeout(() => {
        window.location.replace(safeDest);
      }, 70);
    }
    
    // start countdown from fresh (initial 5 seconds)
    function startCountdown() {
      haltTimers();
      if (isHeld) return;
      countdown = 5;
      updateCountdownUI();
      
      redirectTimeout = setTimeout(() => {
        if (!isHeld && isRedirectPending) {
          performRedirect();
        }
      }, 5000);
      
      countdownInterval = setInterval(() => {
        if (isHeld) return;
        if (countdown <= 1) {
          // about to redirect, clear interval so no extra step
          if (countdownInterval) clearInterval(countdownInterval);
          countdownInterval = null;
          // countdown already 1, redirect will be triggered by timeout, but ensure if not
          if (!isHeld && isRedirectPending && countdown === 1) {
            // redirect handled by timeout, but avoid extra call
          }
        } else {
          countdown--;
          updateCountdownUI();
        }
      }, 1000);
    }
    
    // resume countdown from current countdown value (used after hold)
    function resumeCountdownFromCurrent() {
      haltTimers();
      if (countdown <= 0) countdown = 1;
      const remainingSecs = countdown;
      
      if (remainingSecs <= 0) {
        performRedirect();
        return;
      }
      
      redirectTimeout = setTimeout(() => {
        if (!isHeld && isRedirectPending) performRedirect();
      }, remainingSecs * 1000);
      
      countdownInterval = setInterval(() => {
        if (isHeld) return;
        if (countdown <= 1) {
          if (countdownInterval) clearInterval(countdownInterval);
          countdownInterval = null;
          // timeout will trigger redirect
        } else {
          countdown--;
          updateCountdownUI();
        }
      }, 1000);
    }
    
    // hold / resume logic (toggle)
    function toggleHold() {
      if (isHeld) {
        // RESUME
        isHeld = false;
        toggleHoldBtn.innerHTML = "⏸️ HOLD";
        toggleHoldBtn.style.background = "";
        // resume from current countdown value
        if (countdown <= 0) countdown = 1;
        resumeCountdownFromCurrent();
      } else {
        // HOLD (pause)
        isHeld = true;
        toggleHoldBtn.innerHTML = "▶️ RESUME";
        toggleHoldBtn.style.background = "rgba(255,190,60,0.2)";
        haltTimers(); // stop interval & timeout, countdown stays frozen
      }
    }
    
    // immediate redirect action
    function redirectNow() {
      if (isRedirectPending || true) {
        performRedirect();
      } else {
        performRedirect(); // fallback safety
      }
    }
    
    // copy destination link WITHOUT preview
    function copyDestinationLink() {
      if (!currentRedirectUrl) {
        showToast("⚠️ No redirect target", 1200);
        return;
      }
      navigator.clipboard.writeText(currentRedirectUrl).then(() => {
        showToast("⚡ Destination link copied", 1400);
        // optional visual feedback on copy button
        const btnSpan = hiddenCopyBtn.querySelector('span:last-child');
        const originalText = btnSpan ? btnSpan.innerText : 'copy link';
        if (btnSpan) btnSpan.innerText = '✓ copied!';
        setTimeout(() => {
          if (btnSpan) btnSpan.innerText = originalText;
        }, 1200);
      }).catch(() => {
        showToast("❌ Copy failed", 1200);
      });
    }
    
    // init core
    function init() {
      // ensure UI doesn't show URL anywhere
      isHeld = false;
      isRedirectPending = true;
      toggleHoldBtn.innerHTML = "⏸️ HOLD";
      toggleHoldBtn.style.background = "";
      startCountdown();
      
      // small console log for dev (no link exposure)
      console.log("⚡ Triveni Pathsala · Vortex active | hidden destination mode");
    }
    
    // attach event listeners
    redirectNowBtn.addEventListener('click', redirectNow);
    toggleHoldBtn.addEventListener('click', toggleHold);
    if (hiddenCopyBtn) hiddenCopyBtn.addEventListener('click', copyDestinationLink);
    
    // clean timers before unload
    window.addEventListener('beforeunload', () => {
      haltTimers();
    });
    
    init();
  })();
</script>
</body>
</html>
